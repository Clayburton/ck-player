<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>listen — clay and kelsy</title>
  <meta name="theme-color" content="#ffffff" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- exactly the two faces the CSS renders: mono regular + serif italic.
       (bold mono, italic mono and Playfair 600 were being downloaded and
       never drawn) -->
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Playfair+Display:ital@1&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css?v=6" />
</head>
<body>
  <div id="mod" class="mod">
    <!-- raw WebGL2: paper grain + one waveform strip per row.
         No engine — this draws N textured quads with one shader, which is
         ~2% of what a scene graph is for, and three.js costs 126KB gzipped. -->
    <canvas id="gl" aria-hidden="true"></canvas>

    <div class="frame">
      <header class="head">
        <span class="head__tag" id="headTag">[ listen ]</span>
        <span class="head__rule" aria-hidden="true"></span>
        <span class="head__note" id="headNote"></span>
      </header>

      <ol class="list" id="list"></ol>

      <footer class="foot">
        <a class="foot__link" id="footLink" target="_top" rel="noopener"></a>
        <a class="foot__cta" id="footCta" target="_top" rel="noopener"></a>
      </footer>
    </div>

    <audio id="au" crossorigin="anonymous" preload="none"></audio>
  </div>

  <script src="waveforms.js?v=2"></script>
  <script src="playlists.js?v=6"></script>
  <script type="module" src="app.js?v=13"></script>
</body>
</html>
